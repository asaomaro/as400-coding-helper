<h1 class="title topictitle1">出力仕様ステートメント</h1><div id="lastModifiedDate"><span>Last Updated</span>: 2021-04-13</div>
<div class="body"><div class="p">出力仕様の一般的なレイアウトは次のとおりです。 
<ul class="ul cds--list--unordered"><li class="li cds--list__item">6 桁目には出力仕様コード (O) が入れられます。</li>
<li class="li cds--list__item">仕様書の注記以外の部分は 7 から 80 桁目です。</li>
<li class="li cds--list__item">仕様書の注記部分は 81 から 100 桁目です。</li>
</ul>
</div>
<div class="p">詳細については、以下の資料を参照してください。
<ul class="ul cds--list--unordered"><li class="li cds--list__item"><a class="xref" href="/docs/ja/ssw_ibm_i_74/rzasd/prlay.htm#prlay">プログラム記述ファイルのレイアウト</a></li>
<li class="li cds--list__item"><a class="xref" href="/docs/ja/ssw_ibm_i_74/rzasd/exlay.htm#exlay">外部記述ファイルのレイアウト</a></li>
</ul>
</div>
