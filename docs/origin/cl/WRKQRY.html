<div> <a name="WRKQRY"></a>
<p>QUERY処理(WRKQRY)コマンドは，QUERY処理画面を表示します。この画面を使用して，QUERY定義を作成，表示，変更，コピー，削除，または印刷したり，あるいはQUERYプログラムを実行することができます。
</p>
<p>このコマンドにはパラメーターはありません。
</p>
