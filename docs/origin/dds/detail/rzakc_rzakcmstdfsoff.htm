<h1 class="title topictitle1">表示装置ファイルの SETOFF (オフ設定) キーワード</h1><div id="lastModifiedDate"><span>Last Updated</span>: 2021-04-13</div>
<div class="body refbody"><p class="shortdesc">SETOFF キーワードは、SETOF キーワードと同じです。</p>
<div class="section"><div class="p">キーワードの形式は次のとおりです。<div class="cds--snippet docs--snippet-v10 cds--snippet--multi cds--snippet--expand"><div class="cds--snippet-container" tabindex="0" aria-label="Code snippet"><pre class="pre codeblock"><code>SETOFF(response-indicator ['text'])</code></pre></div><div class="docs--copy-btn"></div></div>
</div>
<p class="p">SETOF キーワードの使用をお勧めします。</p>
</div>
</div>
