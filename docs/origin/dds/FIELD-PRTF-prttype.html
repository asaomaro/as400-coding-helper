<p class="p"><a class="xref" href="/docs/ja/ssw_ibm_i_74/rzakd/zprint.htm" title="データ記述仕様 (DDS) を使用して印刷装置ファイルを定義するときに、 印刷装置ファイルについてデータ記述仕様 (DDS) 形式の 1 から 44 桁目に入力するには、 以下の規則に従ってください。">印刷装置ファイルの定義</a>の印刷装置ファイルの例には、名前タイプの指定方法が示されています。</p>
