name: aidev CLI tests

# aidev ランタイムガード CLI のテスト（.aidev/bin/test/run.sh）を回す。
# GitHub-hosted の ubuntu-latest は pwsh と git を同梱するため、run.sh の
# sh⇔ps1 パリティ節（worktree 含む）が実際に実行される（ローカル pwsh 不在で
# skip されていた検証をここで担保する）。

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ツール確認（pwsh / git があること）
        run: |
          echo "git:  $(git --version)"
          echo "pwsh: $(pwsh --version)"

      - name: aidev CLI テスト（sh + ps1 パリティ）
        run: sh .aidev/bin/test/run.sh
