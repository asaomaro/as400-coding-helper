name: prompter definitions

# プロンプター定義 JSON が原典（docs/origin）と一致していることを保証する。
#
# 定義 JSON は docs/origin/generate-cl-definitions.mjs が原典HTMLから決定的に生成する。
# 手で編集すると次の再生成で消えるうえ、原典との乖離に気づけないため、
#   1. 検証スクリプトで原典との差分ゼロを確認し、
#   2. 再生成しても差分が出ない（＝生成物が最新である）ことを確認する。
# あわせて拡張のビルドが通ることも見る。

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 定義 JSON と原典の突き合わせ（CL 日本語 / 英語）
        run: |
          node docs/origin/verify-cl-definitions.mjs
          node docs/origin/verify-cl-definitions.mjs --lang=en

      - name: 定義 JSON と原典の突き合わせ（RPG 桁位置）
        run: node docs/origin/verify-rpg-definitions.mjs

      - name: DDS 桁定義の検査
        run: node docs/origin/verify-dds-columns.mjs

      - name: DDS キーワード補完データの検査
        run: node docs/origin/verify-dds-keywords.mjs

      - name: RPG 補完データの検査
        run: node docs/origin/verify-rpg-completion.mjs

      - name: RPG III 命令コードの検査
        run: node docs/origin/verify-rpg3-completion.mjs

      - name: DDS プロンプター定義の検査
        run: node docs/origin/verify-dds-prompter.mjs

      - name: RPG 仕様書定義（英語版）の検査
        run: node docs/origin/verify-rpg-spec-definitions.mjs

      - name: 再生成しても差分が出ないこと
        run: |
          node docs/origin/generate-cl-definitions.mjs
          node docs/origin/generate-cl-definitions.mjs --lang=en
          node docs/origin/generate-dds-columns.mjs
          node docs/origin/generate-dds-keywords.mjs
          node docs/origin/generate-dds-keyword-syntax.mjs
          node docs/origin/generate-dds-keywords.mjs --lang=en
          node docs/origin/generate-dds-keyword-syntax.mjs --lang=en
          node docs/origin/generate-rpg-completion.mjs
          node docs/origin/generate-rpg-completion.mjs --lang=en
          node docs/origin/generate-rpg3-completion.mjs
          node docs/origin/generate-rpg3-completion.mjs --lang=en
          node docs/origin/generate-seu-format-lines.mjs
          node docs/origin/generate-dds-prompter.mjs
          node docs/origin/generate-dds-prompter.mjs --lang=en
          node docs/origin/generate-rpg-spec-definitions.mjs
          if ! git diff --quiet -- vscode-extension/resources/prompter/cl vscode-extension/resources/navigation vscode-extension/resources/completion; then
            echo "::error::定義 JSON が生成結果と一致しません。"
            echo "::error::JSON を手で直さず、生成スクリプトを直して再生成してください。"
            git diff --stat -- vscode-extension/resources/prompter/cl vscode-extension/resources/navigation vscode-extension/resources/completion
            exit 1
          fi

      - name: 拡張のビルドと検証（定義の構造 / CL 往復）
        working-directory: vscode-extension
        run: |
          npm ci || npm install
          npm run verify

      # ユニットテストは依存（mocha / 型定義）が要るので、依存を入れる
      # このジョブで走らせる。verify ジョブは素の node で原典照合をするだけ。
      - name: ユニットテスト
        working-directory: vscode-extension
        run: npm test
